<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Meu Perfil — IASD Central Milagres</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="https://i.ibb.co/DgkWPyfP/229133089-411187380321827-5405016350897760058-n.jpg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="container cabecalho-interno">
      <div class="marca">
        <a href="/."><img src="https://i.ibb.co/DgkWPyfP/229133089-411187380321827-5405016350897760058-n.jpg" alt="Logo" class="logo" draggable="false"></a>
        <p class="nome-site"><a href="/.">IASD Central Milagres</a></p>
      </div>
      <button id="menu-alternar" aria-expanded="false" aria-controls="navegacao-site">☰</button>
      <nav id="navegacao-site" role="navigation">
        <ul>
          <li><a href="/cultos">Cultos</a></li>
          <li><a href="/sobre">Sobre</a></li>
          <li><a href="/local">Local</a></li>
          <li><a href="/imagens">Imagens</a></li>
          <li><a href="/contato">Contato</a></li>
          <li><a href="/perfil">Meu Perfil</a></li>
        </ul>
      </nav>
      <button id="tema-alternar" aria-label="Alternar tema">🌙</button>
    </div>
  </header>

  <main class="container">
    <section aria-labelledby="titulo-perfil" class="secao-perfil">
      <h1 id="titulo-perfil">Meu Perfil</h1>
      <p class="texto-intro">Aqui você pode atualizar seus dados e sua foto de perfil.</p>

      <div class="perfil-layout">
        <div class="perfil-col perfil-resumo">
          <div class="perfil-avatar-wrapper">
            <img id="perfil-avatar" class="perfil-avatar" alt="Foto de perfil">
            <label for="perfil-foto" class="btn-ghost">Alterar foto</label>
            <input type="file" id="perfil-foto" accept="image/*" hidden>
          </div>
          <div class="perfil-info">
            <p id="perfil-nome-resumo" class="perfil-nome-resumo"></p>
            <p id="perfil-igreja-resumo" class="perfil-igreja-resumo"></p>
            <p id="perfil-cargo-resumo" class="perfil-cargo-resumo"></p>
          </div>
        </div>

        <div class="perfil-col">
          <form id="form-perfil">
            <label for="perfil-nome">Nome completo</label>
            <input type="text" id="perfil-nome" required>

            <label for="perfil-email">Email</label>
            <input type="email" id="perfil-email" required disabled>
            <small class="campo-ajuda">O email é usado para login e não pode ser alterado.</small>

            <label for="perfil-igreja">Igreja</label>
            <input type="text" id="perfil-igreja" required>

            <label for="perfil-idade">Idade</label>
            <input type="number" id="perfil-idade" min="0" max="120" required>

            <label for="perfil-cargo">Cargo na igreja</label>
            <input type="text" id="perfil-cargo" required>

            <label for="perfil-senha-atual">Senha atual (para alterar senha)</label>
            <input type="password" id="perfil-senha-atual" autocomplete="current-password">

            <label for="perfil-senha-nova">Nova senha</label>
            <input type="password" id="perfil-senha-nova" autocomplete="new-password">

            <div class="perfil-acoes">
              <button type="submit">Salvar alterações</button>
              <button type="button" id="btn-sair" class="btn-secundario">Sair</button>
            </div>
          </form>

          <p id="perfil-mensagem" class="auth-mensagem" role="status" aria-live="polite"></p>
        </div>
      </div>
    </section>
  </main>

  <footer class="container">
    <p><a href="/.">Voltar à página inicial</a></p>
  </footer>

  <script src="js/script.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
